apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: hello-world
  namespace: rup-cnpg
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  instances: 1
  primaryUpdateStrategy: unsupervised
  storage:
    size: 1Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
