apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../installation
- metrics_rbac.yaml

patches:
- path: manager_https_metrics_patch.yaml
  target:
    kind: Deployment
- path: metrics_service_https_patch.yaml
  target:
    kind: Service
    name: rabbitmq-cluster-operator-metrics-service
